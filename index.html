<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Fitness Freak</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D0D;color:#F2F2F2;font-family:-apple-system,sans-serif;padding:16px}
.card{background:#1A1A1A;border:1px solid #2E2E2E;border-radius:14px;padding:16px;margin-bottom:12px}
.pbar{height:8px;background:#2E2E2E;border-radius:4px;overflow:hidden;margin-bottom:6px}
.pfill{height:100%;background:#D85A30;border-radius:4px}
.rtrow{display:flex;gap:8px}
.rtbtn{flex:1;padding:10px;border-radius:10px;border:none;background:#2A2A2A;color:#777;font-weight:700;font-size:13px;cursor:pointer}
.rtbtn.sel{background:#D85A30;color:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.dcard{background:#1A1A1A;border:1px solid #2E2E2E;border-radius:14px;padding:14px;cursor:pointer;position:relative;overflow:hidden}
.dbar{position:absolute;left:0;top:0;bottom:0;width:4px}
.dnum{font-size:10px;color:#555;letter-spacing:.09em;margin-bottom:4px}
.dname{font-size:22px;font-weight:700;margin-bottom:4px}
.dfocus{font-size:11px;color:#666;line-height:1.4;margin-bottom:8px}
.full{grid-column:span 2}
.resetbtn{width:100%;padding:12px;border-radius:12px;background:transparent;border:1px solid #2E2E2E;color:#555;cursor:pointer;font-size:13px;font-weight:600;margin-top:4px;display:none}
.foot{text-align:center;margin-top:20px;font-size:11px;color:#333}
#scrDay{display:none}
.tmrbar{background:#111;border-bottom:2px solid #D85A30;padding:12px 16px;position:sticky;top:0;z-index:10;display:none;align-items:center;gap:10px}
.tmrcount{font-size:22px;font-weight:700;margin:4px 0}
.tmrpbar{height:5px;background:#2E2E2E;border-radius:3px;overflow:hidden}
.tmrfill{height:100%;background:#D85A30;border-radius:3px;transition:width 1s linear}
.skipbtn{background:#2A2A2A;border:none;color:#888;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0}
.dhdr{padding:16px;border-bottom:1px solid #1E1E1E}
.backbtn{background:rgba(255,255,255,.08);border:none;color:#CCC;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;margin-bottom:12px;display:inline-block}
.hdrlbl{font-size:11px;font-weight:700;letter-spacing:.12em;margin-bottom:4px}
.hdrname{font-size:30px;font-weight:700;margin-bottom:2px}
.hdrfocus{font-size:13px;color:#888;margin-bottom:12px}
.hdrprog{display:flex;align-items:center;gap:10px}
.hdrprogbar{flex:1;height:5px;background:#1E1E1E;border-radius:3px;overflow:hidden}
.hdrprogfill{height:100%;border-radius:3px;transition:width .3s}
.hdrprogsets{font-size:13px;color:#777;font-weight:700}
.exlist{padding:12px 16px 30px}
.excard{border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid #2E2E2E;background:#1A1A1A}
.exhead{padding:14px;cursor:pointer;display:flex;align-items:center;gap:12px}
.exnum{width:34px;height:34px;border-radius:9px;background:#252525;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;color:#666}
.exinfo{flex:1;min-width:0}
.exname{font-size:14px;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exbadges{display:flex;gap:6px;align-items:center}
.bcable{font-size:11px;padding:3px 7px;border-radius:20px;background:#071830;color:#5AABF0;font-weight:700}
.bmachine{font-size:11px;padding:3px 7px;border-radius:20px;background:#251400;color:#E09A20;font-weight:700}
.exreps{font-size:12px;color:#666;font-weight:700}
.exprog{text-align:right;flex-shrink:0}
.exprognum{font-size:16px;font-weight:700}
.exarrow{font-size:15px;color:#444;margin-top:3px}
.exdetail{border-top:1px solid #252525;display:none}
.eximg{width:100%;max-height:180px;object-fit:cover;object-position:top;display:block;background:#111;border-bottom:1px solid #1E1E1E}
.exbody{padding:14px}
.formcue{border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid transparent}
.formcuelbl{font-size:10px;font-weight:700;letter-spacing:.1em;margin-bottom:6px}
.formcuetxt{font-size:13px;color:#CCC;line-height:1.6}
.muscles{font-size:12px;color:#666;margin-bottom:12px}
.musclesval{color:#999;font-weight:700}
.wt{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.wtinput{flex:1;background:#111;border:1px solid #2E2E2E;border-radius:9px;padding:9px 12px;color:#F2F2F2;font-size:14px}
.wtinput:focus{outline:none;border-color:#555}
.setslbl{font-size:11px;color:#555;font-weight:700;letter-spacing:.1em;margin-bottom:10px}
.setsrow{display:flex;gap:8px;flex-wrap:wrap}
.setbtn{width:54px;height:54px;border-radius:12px;border:1px solid #333;background:#141414;color:#666;font-weight:700;font-size:16px;cursor:pointer}
.setbtn.done{border:none;color:#fff}
.restcard{background:#1A1A1A;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;border-left:4px solid;border-top:1px solid #2E2E2E;border-right:1px solid #2E2E2E;border-bottom:1px solid #2E2E2E}
</style>
</head>
<body>
<div id="scrHome">

    <div style="font-size:28px;font-weight:700;margin-bottom:4px">Fitness Freak &#x1F4AA;</div>
    <div style="color:#666;font-size:13px;margin-bottom:20px">Machine &amp; cable only &middot; ~20 sets per muscle</div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;color:#888">Weekly progress</span>
        <span style="font-size:14px;font-weight:700" id="homeSets">0 / 145 sets</span>
      </div>
      <div class="pbar"><div class="pfill" id="homeBar" style="width:0%"></div></div>
      <div style="font-size:12px;color:#555" id="homePct">0% complete</div>
    </div>
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:#555;letter-spacing:.1em;margin-bottom:10px">REST TIMER</div>

        <button class="rtbtn" onclick="setRest(60)">60s</button>
        <button class="rtbtn sel" onclick="setRest(90)">90s</button>

</div>

<div id="scrDay">
  <div class="tmrbar" id="tmrBar">
    <span style="font-size:20px">&#9201;</span>
    <div style="flex:1">
      <div style="font-size:12px;color:#888">Rest timer</div>
      <div class="tmrcount" id="tmrCount">90s</div>
      <div class="tmrpbar"><div class="tmrfill" id="tmrFill" style="width:100%"></div></div>
    </div>
    <button class="skipbtn" onclick="skipTimer()">Skip</button>
  </div>
  <div class="dhdr" id="dayHdr">
    <button class="backbtn" onclick="goHome()">&larr; Back</button>
    <div class="hdrlbl" id="hdrNum">DAY 1</div>
    <div class="hdrname" id="hdrName">PUSH</div>
    <div class="hdrfocus" id="hdrFocus"></div>
    <div class="hdrprog">
      <div class="hdrprogbar"><div class="hdrprogfill" id="hdrProgFill"></div></div>
      <span class="hdrprogsets" id="hdrProgSets">0/27</span>

  </div>
  <div id="restSection" style="display:none;padding:14px 16px">
    <div style="font-size:13px;color:#666;margin-bottom:12px">Rest day - recovery equally important hai!</div>
    <div id="restTips"></div>
  </div>
  <div class="exlist" id="exList"></div>
</div>

  {id:"d1",num:1,name:"PUSH",color:"#D85A30",bg:"#1E0E07",focus:"Chest / Side Delts / Triceps",total:27,isRest:false,ex:[

var REST_TIPS = [
  {icon:"🌙",title:"Sleep 7-9 hours",body:"GH and IGF-1 peak during deep sleep - primary driver of muscle protein synthesis"},
  {icon:"🚶",title:"Light walking",body:"Promotes blood flow and nutrient delivery without accumulating fatigue"},
  {icon:"🧘",title:"Mobility work",body:"Hip flexors, thoracic spine, shoulder capsule - 15-20 min"},

];

var TOTAL = 145, done = {}, weights = {}, restSec = 90;
var timerInt = null, timerRem = 0, timerTot = 0;
var curDay = null, openEx = null;

function setRest(s) {
  restSec = s;
  document.querySelectorAll(".rtbtn").forEach(function(b) {
    b.classList.toggle("sel", parseInt(b.textContent) === s);
  });
}

function startTimer() {
  clearInterval(timerInt);
  timerRem = restSec; timerTot = restSec;
  var bar = document.getElementById("tmrBar");
  bar.style.display = "flex";
  var d = getDay(curDay);
  if (d) { bar.style.borderBottomColor = d.color; document.getElementById("tmrFill").style.background = d.color; }
  tick();
  timerInt = setInterval(tick, 1000);
}

function tick() {
  document.getElementById("tmrCount").textContent = timerRem + "s";
  document.getElementById("tmrFill").style.width = Math.round(timerRem / timerTot * 100) + "%";
  if (timerRem <= 0) skipTimer();
  timerRem--;
}

function skipTimer() {
  clearInterval(timerInt);
  document.getElementById("tmrBar").style.display = "none";
}

function getDay(id) {
  for (var i = 0; i < DAYS.length; i++) if (DAYS[i].id === id) return DAYS[i];
  return null;
}

function totalDone() {
  var n = 0;
  for (var k in done) if (done[k]) n++;
  return n;
}

function getProgress(d) {
  if (!d.ex.length) return null;
  var tot = 0, got = 0;
  for (var i = 0; i < d.ex.length; i++) {
    tot += d.ex[i].s;
    for (var j = 0; j < d.ex[i].s; j++) {
      if (done[d.id + "_" + i + "_" + j]) got++;
    }
  }
  return { tot: tot, got: got, pct: got / tot };
}

function goHome() {
  skipTimer(); openEx = null;
  document.getElementById("scrHome").style.display = "block";
  document.getElementById("scrDay").style.display = "none";
  renderHome();
}

function openDay(id) {
  curDay = id; openEx = null;
  document.getElementById("scrHome").style.display = "none";
  document.getElementById("scrDay").style.display = "block";
  renderDay();
}

function toggleEx(ei) {
  openEx = (openEx === ei) ? null : ei;
  renderDay();
}

function toggleSet(dayId, ei, si) {
  var k = dayId + "_" + ei + "_" + si;
  done[k] = !done[k];
  if (done[k]) startTimer();
  renderDay();
}

function saveWeight(dayId, ei, val) {
  weights[dayId + "_" + ei] = val;
}

function resetWeek() {
  if (!confirm("Reset karna chahte ho?")) return;
  done = {}; weights = {};
  renderHome();
}

function el(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  return e;
}

function renderHome() {
  var td = totalDone();
  var pct = Math.round(td / TOTAL * 100);
  document.getElementById("homeSets").textContent = td + " / " + TOTAL + " sets";
  document.getElementById("homeBar").style.width = pct + "%";
  document.getElementById("homePct").textContent = pct + "% complete";
  document.getElementById("resetBtn").style.display = td > 0 ? "block" : "none";

  var grid = document.getElementById("dayGrid");
  while (grid.firstChild) grid.removeChild(grid.firstChild);

  for (var i = 0; i < DAYS.length; i++) {
    var d = DAYS[i];
    var p = getProgress(d);
    var complete = p && p.got === p.tot && p.tot > 0;

    var card = el("div", "dcard" + (d.isRest && d.num === 7 ? " full" : ""));
    if (complete) { card.style.background = "rgba(255,255,255,.04)"; card.style.borderColor = d.color + "55"; }

    var bar = el("div", "dbar");
    bar.style.background = d.color;
    card.appendChild(bar);

    card.appendChild(el("div", "dnum", "DAY " + d.num));

    var nm = el("div", "dname", d.name);
    nm.style.color = complete ? d.color : "#F2F2F2";
    card.appendChild(nm);

    card.appendChild(el("div", "dfocus", d.focus));

    if (p) {
      var pb = el("div");
      pb.style.cssText = "height:3px;background:#2A2A2A;border-radius:2px;overflow:hidden;margin-bottom:5px";
      var pf = el("div");
      pf.style.cssText = "height:100%;border-radius:2px;background:" + d.color + ";width:" + Math.round(p.pct * 100) + "%";
      pb.appendChild(pf);
      card.appendChild(pb);
      var ps = el("div");
      ps.style.cssText = "font-size:11px;color:#555";
      ps.textContent = p.got + "/" + p.tot + " sets";
      card.appendChild(ps);
    }

    if (complete) {
      var ck = el("div");
      ck.style.cssText = "position:absolute;top:12px;right:12px;font-size:20px";
      ck.textContent = "✅";
      card.appendChild(ck);
    }

    (function(id) { card.onclick = function() { openDay(id); }; })(d.id);
    grid.appendChild(card);
  }
}

function renderDay() {
  var d = getDay(curDay);
  if (!d) return;
  var p = getProgress(d);

  var hdr = document.getElementById("dayHdr");
  hdr.style.background = d.bg;
  document.getElementById("hdrNum").textContent = "DAY " + d.num;
  document.getElementById("hdrNum").style.color = d.color;
  document.getElementById("hdrName").textContent = d.name;
  document.getElementById("hdrName").style.color = d.color;
  document.getElementById("hdrFocus").textContent = d.focus;
  if (p) {
    document.getElementById("hdrProgFill").style.width = Math.round(p.pct * 100) + "%";
    document.getElementById("hdrProgFill").style.background = d.color;
    document.getElementById("hdrProgSets").textContent = p.got + "/" + p.tot + " sets";
  }

  if (d.isRest) {
    document.getElementById("restSection").style.display = "block";
    document.getElementById("exList").style.display = "none";
    var tips = document.getElementById("restTips");
    while (tips.firstChild) tips.removeChild(tips.firstChild);
    for (var t = 0; t < REST_TIPS.length; t++) {
      var tp = REST_TIPS[t];
      var rc = el("div", "restcard");
      rc.style.borderLeftColor = d.color;
      rc.innerHTML = "<span style='font-size:22px;flex-shrink:0'>" + tp.icon + "</span><div><div style='font-size:14px;font-weight:700;margin-bottom:4px'>" + tp.title + "</div><div style='font-size:13px;color:#777;line-height:1.6'>" + tp.body + "</div></div>";
      tips.appendChild(rc);
    }
    return;
  }

  document.getElementById("restSection").style.display = "none";
  document.getElementById("exList").style.display = "block";
  var list = document.getElementById("exList");
  while (list.firstChild) list.removeChild(list.firstChild);

  for (var i = 0; i < d.ex.length; i++) {
    var ex = d.ex[i];
    var got = 0;
    for (var j = 0; j < ex.s; j++) if (done[d.id + "_" + i + "_" + j]) got++;
    var allS = got === ex.s;
    var isOpen = openEx === i;

    var card = el("div", "excard");
    if (allS) { card.style.background = d.bg; card.style.borderColor = d.color + "55"; }

    // Header row
    var head = el("div", "exhead");
    (function(idx) { head.onclick = function() { toggleEx(idx); }; })(i);

    var num = el("div", "exnum", allS ? "✓" : String(i + 1));
    if (allS) { num.style.background = d.color; num.style.color = "#fff"; }
    head.appendChild(num);

    var info = el("div", "exinfo");
    var nm2 = el("div", "exname", ex.n);
    nm2.style.color = allS ? d.color : "#F2F2F2";
    info.appendChild(nm2);

    var badges = el("div", "exbadges");
    var typeSpan = el("span", ex.t === "Cable" ? "bcable" : "bmachine", ex.t === "Cable" ? "🔗 Cable" : "⚙️ Machine");
    badges.appendChild(typeSpan);
    var repsSpan = el("span", "exreps", ex.s + " x " + ex.r);
    badges.appendChild(repsSpan);
    info.appendChild(badges);
    head.appendChild(info);

    var prog = el("div", "exprog");
    var progNum = el("div", "exprognum", got + "/" + ex.s);
    progNum.style.color = allS ? d.color : "#666";
    prog.appendChild(progNum);
    prog.appendChild(el("div", "exarrow", isOpen ? "▲" : "▼"));
    head.appendChild(prog);
    card.appendChild(head);

    // Detail section
    if (isOpen) {
      var det = el("div", "exdetail");
      det.style.display = "block";

      // Image
      var imgUrl = IMGS[ex.n];
      if (imgUrl) {
        var img = document.createElement("img");
        img.className = "eximg";
        img.src = imgUrl;
        img.alt = ex.n;
        img.loading = "lazy";
        img.onerror = function() { this.style.display = "none"; };
        det.appendChild(img);
      }

      var body = el("div", "exbody");

      // Form cue
      var fc = el("div", "formcue");
      fc.style.background = d.bg;
      fc.style.borderColor = d.color + "30";
      var fcl = el("div", "formcuelbl", "📋 FORM CUE");
      fcl.style.color = d.color;
      fc.appendChild(fcl);
      fc.appendChild(el("div", "formcuetxt", ex.note));
      body.appendChild(fc);

      // Muscles
      var ms = el("div", "muscles");
      ms.innerHTML = "💪 Muscles: <span class='musclesval'>" + ex.m + "</span>";
      body.appendChild(ms);

      // Weight input
      var wtRow = el("div", "wt");
      wtRow.appendChild(el("span", null, "🏋"));
      var inp = document.createElement("input");
      inp.className = "wtinput";
      inp.type = "text";
      inp.placeholder = "Weight used e.g. 60 kg";
      inp.value = weights[d.id + "_" + i] || "";
      (function(di, ei) {
        inp.oninput = function() { saveWeight(di, ei, this.value); };
      })(d.id, i);
      wtRow.appendChild(inp);
      body.appendChild(wtRow);

      // Sets label
      body.appendChild(el("div", "setslbl", "TAP SET TO COMPLETE → TIMER STARTS"));

      // Set buttons
      var setsRow = el("div", "setsrow");
      for (var j = 0; j < ex.s; j++) {
        var isDone = done[d.id + "_" + i + "_" + j];
        var btn = el("button", "setbtn" + (isDone ? " done" : ""), isDone ? "✓" : String(j + 1));
        if (isDone) btn.style.background = d.color;
        (function(di, ei, si) {
          btn.onclick = function() { toggleSet(di, ei, si); };
        })(d.id, i, j);
        setsRow.appendChild(btn);
      }
      body.appendChild(setsRow);
      det.appendChild(body);
      card.appendChild(det);
    }

    list.appendChild(card);
  }
}

renderHome();

})();
</script>
</body>
</html>
